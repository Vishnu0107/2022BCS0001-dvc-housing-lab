name: ML Pipeline

on:
  push:
    branches: [main, master]

jobs:
  train:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install dvc[s3] pandas scikit-learn numpy

    - name: Pull Dataset from S3
      run: |
        dvc pull

    - name: Run Training
      run: |
        python src/train.py > metrics.txt

    - name: Write Results to GitHub Summary
      run: |
        echo "## Result Version 1 - 2022BCS0001" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Dataset Size:" >> $GITHUB_STEP_SUMMARY
        wc -l data/housing.csv >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Training Metrics:" >> $GITHUB_STEP_SUMMARY
        cat metrics.txt >> $GITHUB_STEP_SUMMARY

    - name: Upload Metrics Artifact
      uses: actions/upload-artifact@v4
      with:
        name: training-metrics
        path: metrics.txt

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/housing-ml .

    - name: Login to DockerHub
      run: |
        echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/housing-ml