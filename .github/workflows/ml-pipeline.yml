name: ML Pipeline

on:
  push:
    branches: [ master, main ]

jobs:
  train:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install dvc[s3]
        pip install pandas scikit-learn

    - name: Pull Dataset from S3 (DVC)
      run: |
        dvc pull

    - name: Train Model
      run: |
        python src/train.py

    - name: Record Dataset Size
      run: |
        echo "Dataset size:" > summary.txt
        wc -l data/housing.csv >> summary.txt

    - name: Upload Results Artifact
      uses: actions/upload-artifact@v4
      with:
        name: training-results
        path: summary.txt

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/housing-ml .

    - name: Login to DockerHub
      run: |
        echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/housing-ml